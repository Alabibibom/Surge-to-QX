# 中国域名
DOMAIN-SET,https://cdn.jsdelivr.net/gh/Loyalsoldier/surge-rules@release/direct.txt,国内,extended-matching,"update-interval=-1",no-resolve

# 中国 IP
# 1.IPv4
RULE-SET,https://ruleset.skk.moe/List/ip/china_ip.conf,国内,extended-matching,"update-interval=-1",no-resolve

# 2.IPv6
