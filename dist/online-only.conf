# 查找
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/FindMy/FindMy.list,国内,extended-matching,"update-interval=-1",no-resolve

# 局域网
# 1.Non IP
RULE-SET,https://ruleset.skk.moe/List/non_ip/lan.conf,DIRECT,extended-matching,"update-interval=-1",no-resolve

# 2.IP
RULE-SET,https://ruleset.skk.moe/List/ip/lan.conf,DIRECT,extended-matching,"update-interval=-1",no-resolve

# siri
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Siri/Siri.list,REJECT-DROP,extended-matching,"update-interval=-1",no-resolve

# iOS升级
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/SystemOTA/SystemOTA.list,国内,extended-matching,"update-interval=-1",no-resolve

# 拦截
# 1.统计类，必须drop，避免暴力重试
RULE-SET,https://ruleset.skk.moe/List/non_ip/reject-drop.conf,REJECT-DROP,pre-matching,extended-matching,"update-interval=-1",no-resolve

# 2.基础的 12 万拦截域名
DOMAIN-SET,https://ruleset.skk.moe/List/domainset/reject.conf,REJECT,extended-matching,"update-interval=-1",no-resolve

# 3.额外 9 万拦截域名，作为基础的补充，启用时需要搭配基础一起使用
DOMAIN-SET,https://ruleset.skk.moe/List/domainset/reject_extra.conf,REJECT,extended-matching,"update-interval=-1",no-resolve

# 4.钓鱼网站拦截域名列表，共 13 万拦截域名
# 4.1.通用规则
RULE-SET,https://ruleset.skk.moe/List/non_ip/reject.conf,REJECT,extended-matching,"update-interval=-1",no-resolve
RULE-SET,https://ruleset.skk.moe/List/non_ip/reject-no-drop.conf,REJECT-NO-DROP,extended-matching,"update-interval=-1",no-resolve

# 4.2.Mac专用规则，在i0S最好注释掉，防止内存占用太大
DOMAIN-SET,https://ruleset.skk.moe/List/domainset/reject_phishing.conf,REJECT,extended-matching,"update-interval=-1",no-resolve

# 5.需搭配 Surge 模块 https://ruleset.skk.moe/Modules/sukka_mitm_hostnames.sgmodule 使用
# MITM 和 URL-REGEX 性能开销极大，不推荐使用
# RULE-SET,https://ruleset.skk.moe/List/non_ip/reject-url-regex.conf,REJECT,"update-interval=-1",no-resolve
# 6.IP
RULE-SET,https://ruleset.skk.moe/List/ip/reject.conf,REJECT,extended-matching,"update-interval=-1",no-resolve

# PCDN 内容分发网络识别
RULE-SET,https://raw.githubusercontent.com/Thoseyearsbrian/Aegis/main/rules/PCDNDomain.list,REJECT,extended-matching,no-resolve

# 群晖官方
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Synology/Synology.list,群晖官方,extended-matching,"update-interval=-1",no-resolve

# GitHub
RULE-SET,https://raw.githubusercontent.com/Thoseyearsbrian/Aegis/main/rules/GitHub.list,规则订阅与OB与GitHub,extended-matching,no-resolve

# 其他AI
RULE-SET,https://ruleset.skk.moe/List/non_ip/ai.conf,国外,extended-matching,"update-interval=-1",no-resolve
RULE-SET,https://ruleset.skk.moe/List/non_ip/apple_intelligence.conf,国外,extended-matching,"update-interval=-1",no-resolve

# Tiktok
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/TikTok/TikTok.list,国外,extended-matching,"update-interval=-1",no-resolve

# 抖音
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/DouYin/DouYin.list,国内,extended-matching,"update-interval=-1",no-resolve

# YouTube
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/YouTube/YouTube.list,国外,extended-matching,"update-interval=-1",no-resolve

# 谷歌
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Google/Google.list,国外,extended-matching,"update-interval=-1",no-resolve

