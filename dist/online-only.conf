RULE-SET,https://ruleset.skk.moe/List/non_ip/telegram.conf,国外,extended-matching,"update-interval=-1",no-resolve
RULE-SET,https://ruleset.skk.moe/List/ip/telegram.conf,国外,extended-matching,"update-interval=-1",no-resolve
