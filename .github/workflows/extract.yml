name: Extract Surge Online Rules to QX

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"
      timezone: "Asia/Shanghai"

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requests
        run: pip install requests

      - name: Run extractor
        run: python scripts/extract_online_rules.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/online-qx.conf
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update online-qx.conf"
            git push
          fi
