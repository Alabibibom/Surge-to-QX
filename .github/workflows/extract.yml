name: Build QX Rules

on:
  workflow_dispatch:
  schedule:
    - cron: '0 21 * * *'   # 每天北京时间/新加坡时间 05:00（UTC+8）
  push:
    paths:
      - 'sources/**'
      - 'scripts/**'
      - '.github/workflows/**'

concurrency:
  group: build-qx-rules-main
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Build rule sets
        run: |
          python scripts/build_qx_sets.py

      - name: List generated files
        run: |
          echo "---- dist ----"
          ls -la dist || true
          find dist -type f | sort || true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ ! -d dist ] || [ -z "$(find dist -type f | head -n 1)" ]; then
            echo "dist is missing or empty, skip commit"
            exit 0
          fi

          git add dist

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update dist"
          git pull --rebase origin main
          git push origin main
